name: Jules İşi Bitirdi (Mail At)

on:
  pull_request:
    types: [opened]

jobs:
  send_email:
    runs-on: ubuntu-latest
    steps:
      - name: Patron Hakan'a Mail Gönder
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: solarbot100@gmail.com # Maili GÖNDEREN hesap (Jules'un motoru)
          password: ${{ secrets.EMAIL_SIFRE }}
          subject: "🚀 Günaydın! Jules Gece Vardiyasını Bitirdi!"
          body: "Patron, gece 12'de verdiğin görev bitti. Yeni uygulamanı React Native ve Expo ile kodladım ve GitHub'a yükledim. PR sekmesinden kodları inceleyebilirsin! - Otonom Ajanın Jules"
          to: hakanersoy880@gmail.com # Mailin GİDECEĞİ hesap (Senin adresin)
          from: Jules Otonom Sistem <solarbot100@gmail.com>
