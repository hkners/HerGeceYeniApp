name: Gece Vardiyasi (Jules'u Uyandir)

on:
  schedule:
    - cron: '0 21 * * *' # Türkiye saati ile tam gece 00:00
  workflow_dispatch: # Manuel çalıştırma butonu

jobs:
  fikir_bul_ve_julesa_ver:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Kodları Al
        uses: actions/checkout@v4

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Gemini'den Fikir Üret
        id: uret
        run: |
          # Fikri bir dosyaya yazarak yakalıyoruz
          node fikir-motoru.js > fikir_sonuc.txt
          # Dosya içeriğini GitHub ortamına aktarıyoruz
          echo "APP_FIKRI<<EOF" >> $GITHUB_ENV
          cat fikir_sonuc.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Jules İçin Görev (Issue) Aç
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIKIR: ${{ env.APP_FIKRI }}
        run: |
          # Fikir boş gelirse sistemi durdurur
          if [ -z "$FIKIR" ]; then
            echo "Hata: Gemini'den fikir alınamadı!"
            exit 1
          fi
          # Doğru etiketle görevi oluşturur
          gh issue create --title "🚀 Gecenin Uygulaması" --body "$FIKIR" --label "jules"
