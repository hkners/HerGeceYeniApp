name: Gece Vardiyasi (Jules'u Uyandir)

on:
  schedule:
    - cron: '0 21 * * *' # Türkiye saati ile 00:00
  workflow_dispatch:

jobs:
  fikir_bul_ve_julesa_ver:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Kodlari Al
        uses: actions/checkout@v4

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: SDK'yi Yukle
        run: npm install @google/generative-ai

      - name: Gemini'den Fikir Uret
        id: uret
        run: |
          node fikir-motoru.js > fikir.txt
          # EOF hatasını önlemek için tek blokta yazıyoruz
          echo "APP_FIKRI<<GECENIN_FIKRI" >> $GITHUB_ENV
          cat fikir.txt >> $GITHUB_ENV
          echo "GECENIN_FIKRI" >> $GITHUB_ENV
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Jules Icin Gorev (Issue) Ac
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIKIR: ${{ env.APP_FIKRI }}
        run: |
          if [ -z "$FIKIR" ]; then
            echo "Hata: Fikir bos!"
            exit 1
          fi
          gh issue create --title "🚀 Gecenin Uygulamasi" --body "$FIKIR" --label "jules"
