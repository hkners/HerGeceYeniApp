name: Gece Vardiyasi (Jules'u Uyandir)

on:
  schedule:
    - cron: '0 21 * * *' # Türkiye saati ile 00:00
  workflow_dispatch:

jobs:
  fikir_bul_ve_julesa_ver:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Kodlari Al
        uses: actions/checkout@v4

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: SDK'yi Yukle
        run: npm install @google/generative-ai

      - name: Fikir Uret ve Issue Ac
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fikri node ile uretip bir dosyaya yaziyoruz
          node fikir-motoru.js > fikir.txt
          
          # Dosyanın içeriğini oku
          FIKIR=$(cat fikir.txt)
          
          # Eğer fikir boşsa dur
          if [ -z "$FIKIR" ]; then
            echo "Hata: Gemini fikir uretemedi!"
            exit 1
          fi
          
          # Issue'yu doğrudan burada oluştur (EOF hatasını bypass eder)
          gh issue create --title "🚀 Gecenin Uygulamasi" --body "$FIKIR" --label "jules"
